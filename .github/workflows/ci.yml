name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
      - name: Code style
        run: |
          cargo fmt
          git --no-pager diff --exit-code
      - name: Build
        run: cargo build --verbose
      - name: Run tests
        run: cargo test --verbose
